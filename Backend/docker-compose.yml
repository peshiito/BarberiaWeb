services:
    barberia_db:
        image: mysql:8.0
        container_name: barberia_db
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: sistema_barberia
        ports:
            - "3306:3306"
        volumes:
            - db_data:/var/lib/mysql
            - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
            interval: 5s
            timeout: 5s
            retries: 10

    phpmyadmin:
        image: phpmyadmin:latest
        container_name: barberia_phpmyadmin
        restart: always
        environment:
            PMA_HOST: barberia_db
            PMA_USER: root
            PMA_PASSWORD: root
        ports:
            - "8080:80"
        depends_on:
            barberia_db:
                condition: service_healthy

volumes:
    db_data:
